version: '3.8'

services:
  bot:
    build: .
    container_name: dungeon-and-slop-bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: dungeon-and-slop-db
    environment:
      POSTGRES_USER: dungeonbot
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dungeonandslop
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dungeonbot -d dungeonandslop']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
